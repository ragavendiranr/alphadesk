name: Deploy Frontend to Vercel

on:
  push:
    branches: [claude/alphadesk-trading-system-SpQzC]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd alphadesk/frontend
          VITE_BACKEND_URL="" VITE_WS_URL="" vercel --token "$VERCEL_TOKEN" --prod --yes
