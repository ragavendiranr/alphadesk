name: Deploy Backend to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --project eac5bd92-137c-4515-a4ff-fb19554e09b2 \
            --service e04e5a6c-468b-4a56-a5f8-06b60be91260 \
            --environment f14ed114-72ce-4101-a46c-b8cb52403ea1 \
            --detach
